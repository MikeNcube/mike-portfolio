<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Agentic AI Workflow Automation System  architecture">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    </pattern>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00C896"/>
    </linearGradient>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0066FF"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#00C896"/>
    </marker>
    <marker id="adim" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="rgba(255,255,255,0.35)"/>
    </marker>
    <filter id="soft"><feGaussianBlur stdDeviation="22"/></filter>
  </defs>

  <rect width="1200" height="760" fill="#0a0d14"/>
  <rect width="1200" height="760" fill="url(#g)"/>
  <ellipse cx="620" cy="360" rx="620" ry="280" fill="#0066FF" opacity="0.07" filter="url(#soft)"/>

  <!-- Title -->
  <text x="60" y="52" fill="#fff" font-family="Inter,system-ui" font-size="20" font-weight="700">Agentic AI Workflow Automation System</text>
  <text x="60" y="74" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="11">planner · executor · critic · typed tools · idempotent steps · replayable runs</text>

  <!-- ============ CLIENT ============ -->
  <g transform="translate(60,120)">
    <rect width="160" height="70" rx="12" fill="#0f1320" stroke="rgba(255,255,255,0.12)"/>
    <text x="80" y="30" text-anchor="middle" fill="#fff" font-family="Inter,system-ui" font-size="14" font-weight="600">Client</text>
    <text x="80" y="50" text-anchor="middle" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="10">HTTP · auth · idemp-key</text>
  </g>

  <!-- ============ FASTAPI GATEWAY ============ -->
  <g transform="translate(260,120)">
    <rect width="180" height="70" rx="12" fill="#0f1320" stroke="rgba(0,102,255,0.45)"/>
    <text x="90" y="30" text-anchor="middle" fill="#fff" font-family="Inter,system-ui" font-size="14" font-weight="600">FastAPI Gateway</text>
    <text x="90" y="50" text-anchor="middle" fill="#7dd3fc" font-family="JetBrains Mono,monospace" font-size="10">Pydantic · OpenAPI</text>
  </g>

  <!-- arrow client -> api -->
  <line x1="220" y1="155" x2="260" y2="155" stroke="#0066FF" stroke-width="2" marker-end="url(#a)"/>

  <!-- ============ ORCHESTRATOR (big card) ============ -->
  <g transform="translate(480,100)">
    <rect width="440" height="300" rx="18" fill="#0f1320" stroke="rgba(0,102,255,0.55)"/>
    <text x="20" y="28" fill="#fff" font-family="Inter,system-ui" font-size="14" font-weight="700">Orchestrator</text>
    <text x="20" y="46" fill="#7dd3fc" font-family="JetBrains Mono,monospace" font-size="10">replayable run · trace per step</text>

    <!-- PLANNER -->
    <g transform="translate(20,70)">
      <rect width="180" height="90" rx="12" fill="#0c1020" stroke="rgba(255,255,255,0.12)"/>
      <text x="90" y="26" text-anchor="middle" fill="#fff" font-family="Inter,system-ui" font-size="13" font-weight="600">Planner</text>
      <text x="90" y="48" text-anchor="middle" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="10">cheap model</text>
      <text x="90" y="66" text-anchor="middle" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="10">plan ’ step list</text>
    </g>

    <!-- EXECUTOR -->
    <g transform="translate(240,70)">
      <rect width="180" height="90" rx="12" fill="#0c1020" stroke="rgba(0,102,255,0.4)"/>
      <text x="90" y="26" text-anchor="middle" fill="#fff" font-family="Inter,system-ui" font-size="13" font-weight="600">Executor</text>
      <text x="90" y="48" text-anchor="middle" fill="#7dd3fc" font-family="JetBrains Mono,monospace" font-size="10">strong model</text>
      <text x="90" y="66" text-anchor="middle" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="10">typed tool calls</text>
    </g>

    <!-- loop arrows between planner and executor -->
    <line x1="200" y1="105" x2="240" y2="105" stroke="#0066FF" stroke-width="1.8" marker-end="url(#a)"/>
    <line x1="240" y1="135" x2="200" y2="135" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#adim)"/>

    <!-- CRITIC -->
    <g transform="translate(130,190)">
      <rect width="180" height="80" rx="12" fill="#0c1020" stroke="rgba(0,200,150,0.45)"/>
      <text x="90" y="26" text-anchor="middle" fill="#fff" font-family="Inter,system-ui" font-size="13" font-weight="600">Critic</text>
      <text x="90" y="46" text-anchor="middle" fill="#6ee7b7" font-family="JetBrains Mono,monospace" font-size="10">rejects · re-dispatches</text>
      <text x="90" y="62" text-anchor="middle" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="10">gate before emit</text>
    </g>

    <!-- executor -> critic, critic -> executor -->
    <line x1="330" y1="160" x2="260" y2="190" stroke="#00C896" stroke-width="1.8" marker-end="url(#ag)"/>
    <line x1="180" y1="190" x2="110" y2="160" stroke="rgba(0,200,150,0.8)" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#ag)"/>
  </g>

  <!-- arrow gateway -> orchestrator -->
  <line x1="440" y1="155" x2="480" y2="175" stroke="#0066FF" stroke-width="2" marker-end="url(#a)"/>

  <!-- ============ TYPED TOOL REGISTRY ============ -->
  <g transform="translate(60,240)">
    <rect width="380" height="160" rx="14" fill="#0f1320" stroke="rgba(0,200,150,0.4)"/>
    <text x="20" y="28" fill="#fff" font-family="Inter,system-ui" font-size="13" font-weight="700">Typed Tool Registry</text>
    <text x="20" y="46" fill="#6ee7b7" font-family="JetBrains Mono,monospace" font-size="10">JSON-schema validated · idempotent invocations</text>

    <g font-family="JetBrains Mono,monospace" font-size="11" fill="#e8e8ea">
      <rect x="20" y="62" width="160" height="28" rx="8" fill="#0c1020" stroke="rgba(255,255,255,0.1)"/>
      <text x="32" y="81">tools.http_fetch</text>
      <rect x="200" y="62" width="160" height="28" rx="8" fill="#0c1020" stroke="rgba(255,255,255,0.1)"/>
      <text x="212" y="81">tools.db_query</text>
      <rect x="20" y="100" width="160" height="28" rx="8" fill="#0c1020" stroke="rgba(255,255,255,0.1)"/>
      <text x="32" y="119">tools.email_send</text>
      <rect x="200" y="100" width="160" height="28" rx="8" fill="#0c1020" stroke="rgba(255,255,255,0.1)"/>
      <text x="212" y="119">tools.doc_extract</text>
    </g>
    <text x="20" y="150" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="10">each tool: pydantic In/Out · retry policy · timeouts</text>
  </g>

  <!-- arrows orchestrator <-> tool registry -->
  <line x1="700" y1="280" x2="440" y2="280" stroke="#00C896" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ag)"/>
  <line x1="440" y1="320" x2="700" y2="320" stroke="rgba(0,200,150,0.6)" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#ag)"/>
  <text x="460" y="272" fill="#6ee7b7" font-family="JetBrains Mono,monospace" font-size="10">typed tool-call</text>

  <!-- ============ LLM PROVIDER ============ -->
  <g transform="translate(960,120)">
    <rect width="180" height="130" rx="14" fill="#0f1320" stroke="rgba(255,255,255,0.14)"/>
    <text x="90" y="30" text-anchor="middle" fill="#fff" font-family="Inter,system-ui" font-size="14" font-weight="600">LLM Provider</text>
    <text x="90" y="52" text-anchor="middle" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="10">OpenAI · Anthropic</text>
    <text x="90" y="74" text-anchor="middle" fill="#7dd3fc" font-family="JetBrains Mono,monospace" font-size="10">structured outputs</text>
    <text x="90" y="94" text-anchor="middle" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="10">schema-enforced</text>
    <text x="90" y="114" text-anchor="middle" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="10">cost + latency tracked</text>
  </g>

  <line x1="920" y1="185" x2="960" y2="185" stroke="#0066FF" stroke-width="2" marker-end="url(#a)"/>
  <line x1="960" y1="215" x2="920" y2="215" stroke="rgba(125,211,252,0.7)" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#adim)"/>

  <!-- ============ RUN STORE ============ -->
  <g transform="translate(480,430)">
    <rect width="260" height="120" rx="14" fill="#0f1320" stroke="rgba(255,255,255,0.14)"/>
    <text x="20" y="28" fill="#fff" font-family="Inter,system-ui" font-size="13" font-weight="700">Run Store · Postgres</text>
    <text x="20" y="48" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="10">one row per step event</text>
    <text x="20" y="68" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="10">idempotent by step_id</text>
    <text x="20" y="88" fill="#7dd3fc" font-family="JetBrains Mono,monospace" font-size="10">replay = re-read events</text>
    <text x="20" y="108" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="10">audit · resume after failure</text>
  </g>

  <!-- ============ REDIS ============ -->
  <g transform="translate(770,430)">
    <rect width="200" height="120" rx="14" fill="#0f1320" stroke="rgba(255,255,255,0.14)"/>
    <text x="20" y="28" fill="#fff" font-family="Inter,system-ui" font-size="13" font-weight="700">Redis</text>
    <text x="20" y="48" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="10">idempotency cache</text>
    <text x="20" y="68" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="10">rate limits · queues</text>
    <text x="20" y="88" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="10">run locks (single-writer)</text>
  </g>

  <!-- Orchestrator down to run store + redis (trace emission) -->
  <line x1="640" y1="400" x2="610" y2="430" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#adim)"/>
  <line x1="820" y1="400" x2="860" y2="430" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#adim)"/>
  <text x="540" y="420" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="10">emit step event</text>

  <!-- ============ REPLAY ARROW ============ -->
  <path d="M 480 490 C 380 490 340 460 340 400 L 340 360" fill="none" stroke="url(#accent)" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#a)"/>
  <text x="180" y="500" fill="#00C896" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700">replay / resume</text>
  <text x="180" y="516" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="10">from last good step_id</text>

  <!-- ============ OBSERVABILITY ============ -->
  <g transform="translate(60,600)">
    <rect width="1080" height="110" rx="14" fill="#0f1320" stroke="rgba(255,255,255,0.1)"/>
    <text x="20" y="28" fill="#fff" font-family="Inter,system-ui" font-size="13" font-weight="700">Observability</text>
    <text x="20" y="48" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="10">structured JSON logs · per-run trace IDs · cost &amp; token telemetry · p95 latency · retry rate</text>

    <g font-family="JetBrains Mono,monospace" font-size="10.5" fill="#9a9aa1">
      <rect x="20" y="64" width="330" height="32" rx="8" fill="#0c1020" stroke="rgba(255,255,255,0.08)"/>
      <text x="34" y="85">run_id=01HZ& step=plan status=ok lat=312ms tokens=1804</text>
      <rect x="360" y="64" width="350" height="32" rx="8" fill="#0c1020" stroke="rgba(255,255,255,0.08)"/>
      <text x="374" y="85">step=tool:http_fetch status=ok lat=184ms retries=0</text>
      <rect x="720" y="64" width="340" height="32" rx="8" fill="#0c1020" stroke="rgba(255,255,255,0.08)"/>
      <text x="734" y="85">step=synthesise status=ok lat=740ms tokens=2208</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="60" y="740" fill="rgba(255,255,255,0.35)" font-family="JetBrains Mono,monospace" font-size="10" letter-spacing="1.5">AGENTIC WORKFLOW · SYSTEM ARCHITECTURE · v1</text>
  <text x="1140" y="740" text-anchor="end" fill="rgba(255,255,255,0.35)" font-family="JetBrains Mono,monospace" font-size="10">mikencube · 2025</text>
</svg>
