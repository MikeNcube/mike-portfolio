<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Architecture placeholder">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    </pattern>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00C896"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0066FF"/>
    </marker>
    <filter id="soft"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>

  <rect width="1200" height="700" fill="#0a0d14"/>
  <rect width="1200" height="700" fill="url(#g)"/>
  <ellipse cx="600" cy="350" rx="520" ry="260" fill="#0066FF" opacity="0.08" filter="url(#soft)"/>

  <g transform="translate(60,300)">
    <rect width="180" height="100" rx="14" fill="#0f1320" stroke="rgba(255,255,255,0.12)"/>
    <text x="90" y="45" text-anchor="middle" fill="#fff" font-family="Inter,system-ui" font-size="16" font-weight="600">Client / API</text>
    <text x="90" y="68" text-anchor="middle" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="11">HTTP · typed</text>
  </g>

  <g transform="translate(360,160)">
    <rect width="220" height="120" rx="16" fill="#0f1320" stroke="rgba(0,102,255,0.45)"/>
    <text x="110" y="48" text-anchor="middle" fill="#fff" font-family="Inter,system-ui" font-size="16" font-weight="600">Orchestrator</text>
    <text x="110" y="72" text-anchor="middle" fill="#7dd3fc" font-family="JetBrains Mono,monospace" font-size="11">planner / executor</text>
    <text x="110" y="92" text-anchor="middle" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="11">replayable trace</text>
  </g>

  <g transform="translate(360,440)">
    <rect width="220" height="120" rx="16" fill="#0f1320" stroke="rgba(0,200,150,0.45)"/>
    <text x="110" y="48" text-anchor="middle" fill="#fff" font-family="Inter,system-ui" font-size="16" font-weight="600">Retrieval / Tools</text>
    <text x="110" y="72" text-anchor="middle" fill="#6ee7b7" font-family="JetBrains Mono,monospace" font-size="11">RAG · typed tool registry</text>
    <text x="110" y="92" text-anchor="middle" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="11">idempotent calls</text>
  </g>

  <g transform="translate(700,300)">
    <rect width="220" height="100" rx="14" fill="#0f1320" stroke="rgba(255,255,255,0.12)"/>
    <text x="110" y="45" text-anchor="middle" fill="#fff" font-family="Inter,system-ui" font-size="16" font-weight="600">LLM Provider</text>
    <text x="110" y="68" text-anchor="middle" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="11">structured outputs · evals</text>
  </g>

  <g transform="translate(1000,300)">
    <rect width="140" height="100" rx="14" fill="#0f1320" stroke="rgba(255,255,255,0.12)"/>
    <text x="70" y="45" text-anchor="middle" fill="#fff" font-family="Inter,system-ui" font-size="15" font-weight="600">Store</text>
    <text x="70" y="68" text-anchor="middle" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="11">Postgres · Redis</text>
  </g>

  <g transform="translate(60,610)">
    <rect width="1080" height="50" rx="12" fill="#0f1320" stroke="rgba(255,255,255,0.08)"/>
    <text x="540" y="32" text-anchor="middle" fill="#9a9aa1" font-family="JetBrains Mono,monospace" font-size="12">Observability · structured logs · trace IDs · per-tenant cost &amp; latency</text>
  </g>

  <line x1="240" y1="350" x2="360" y2="220" stroke="#0066FF" stroke-width="2" marker-end="url(#arr)" opacity="0.8"/>
  <line x1="240" y1="350" x2="360" y2="500" stroke="#00C896" stroke-width="2" marker-end="url(#arr)" opacity="0.8"/>
  <line x1="580" y1="220" x2="700" y2="340" stroke="#0066FF" stroke-width="2" marker-end="url(#arr)" opacity="0.8"/>
  <line x1="580" y1="500" x2="700" y2="370" stroke="#00C896" stroke-width="2" marker-end="url(#arr)" opacity="0.8"/>
  <line x1="920" y1="350" x2="1000" y2="350" stroke="url(#accent)" stroke-width="2" marker-end="url(#arr)" opacity="0.9"/>
  <line x1="470" y1="280" x2="470" y2="440" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" stroke-dasharray="4 4"/>

  <text x="60" y="50" fill="rgba(255,255,255,0.35)" font-family="JetBrains Mono,monospace" font-size="11" letter-spacing="2">ARCHITECTURE · PLACEHOLDER</text>
  <text x="1140" y="50" text-anchor="end" fill="rgba(255,255,255,0.25)" font-family="JetBrains Mono,monospace" font-size="11">swap with real diagram</text>
</svg>
